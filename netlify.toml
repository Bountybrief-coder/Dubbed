# Netlify configuration for the Dubbed Vite SPA.

[build]
  command = "npm run build"
  publish = "dist"

# Use a modern Node for the build (Vite 5 needs 18+).
[build.environment]
  NODE_VERSION = "20"

# SPA fallback: the app uses in-app routing, so every path must serve index.html
# and let the client render the right view. Without this, refreshing or deep
# linking to anything other than "/" would 404 on Netlify.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the fingerprinted build assets (Vite hashes filenames).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security headers for all routes ──
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src https://player.twitch.tv https://www.twitch.tv https://checkout.stripe.com; frame-ancestors 'none'; form-action 'self' https://checkout.stripe.com; base-uri 'self'; object-src 'none'"
